name: Build OpenWrt (eBPF) & DAED for WRT3200ACM

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt 官方源码标签/分支'
        required: true
        default: 'v24.10.6'

jobs:
  build:
    name: Build Firmware and Packages
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 终极激进清理：干掉所有不需要的预装大件，腾出至少 30GB+ 的绝对干净空间
    - name: Free Disk Space (Ultimate)
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/share/swift
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/share/logstash
        sudo rm -rf /etc/mysql
        sudo rm -rf /etc/php
        sudo rm -rf /opt/hostedtoolcache
        sudo docker image prune --all --force
        sudo apt-get clean
        df -h

    # 此时根目录空间已处于最完美状态，开始安装全量依赖
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd npm
        
        # 重新全局安装 pnpm
        sudo npm install -g pnpm

    - name: Clone OpenWrt Source
      run: |
        git clone https://github.com/openwrt/openwrt.git -b ${{ github.event.inputs.openwrt_version }} openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Clone DAED Source (kix branch)
      run: |
        cd openwrt/package
        git clone -b kix https://github.com/QiuSimons/luci-app-daed

    - name: Modify Default IP Address
      run: |
        cd openwrt
        sed -i 's/192.168.1.1/172.16.18.254/g' package/base-files/files/bin/config_generate

    - name: Configure Kernel & Packages
      run: |
        cd openwrt
        
        # Target System
        cat >> .config <<EOF
        CONFIG_TARGET_mvebu=y
        CONFIG_TARGET_mvebu_cortexa9=y
        CONFIG_TARGET_mvebu_cortexa9_DEVICE_linksys_wrt3200acm=y
        EOF
        
        # Kernel eBPF / BTF Options
        cat >> .config <<EOF
        CONFIG_DEVEL=y
        CONFIG_BPF_TOOLCHAIN_HOST=y
        CONFIG_KERNEL_BPF_EVENTS=y
        CONFIG_KERNEL_CGROUP_BPF=y
        CONFIG_KERNEL_DEBUG_INFO=y
        CONFIG_KERNEL_DEBUG_INFO_BTF=y
        CONFIG_KERNEL_DEBUG_INFO_REDUCED=n
        CONFIG_KERNEL_XDP_SOCKETS=y
        CONFIG_PACKAGE_kmod-xdp-sockets-diag=y
        CONFIG_KERNEL_KALLSYMS=y
        CONFIG_KERNEL_KPROBES=y
        CONFIG_KERNEL_KPROBE_EVENTS=y
        CONFIG_KERNEL_BPF_STREAM_PARSER=y
        CONFIG_KERNEL_NET_CLS_BPF=y
        CONFIG_KERNEL_NET_ACT_BPF=y
        CONFIG_KERNEL_BPF_SYSCALL=y
        CONFIG_KERNEL_DEBUG_FS=y
        EOF
        
        # LuCI with Chinese language pack
        cat >> .config <<EOF
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-compat=y
        CONFIG_LUCI_LANG_zh_Hans=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        EOF
        
        # Compile DAED as a module (M)
        echo "CONFIG_PACKAGE_luci-app-daed=m" >> .config
        
        make defconfig

    - name: Download Packages
      run: |
        cd openwrt
        make download -j8 || make download -j1 V=s

    - name: Compile Firmware & Packages
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WRT3200ACM-eBPF-DAED
        path: |
          openwrt/bin/targets/mvebu/cortexa9/*factory.img
          openwrt/bin/targets/mvebu/cortexa9/*sysupgrade.bin
          openwrt/bin/packages/**/daed*.ipk
          openwrt/bin/packages/**/luci-app-daed*.ipk
        retention-days: 7
