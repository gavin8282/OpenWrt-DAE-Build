name: Build OpenWrt v24.10.6 DAE Kernel (WRT3200ACM)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libncursesw5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
        dwarves libelf-dev llvm python3-setuptools python3-pyelftools

    - name: Clone Official OpenWrt v24.10.6
      run: |
        git clone -b v24.10.6 --single-branch https://git.openwrt.org/openwrt/openwrt.git openwrt

    - name: Update and Install Feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Customize Base Files (LAN IP & Timezone)
      working-directory: ./openwrt
      run: |
        # 修改默认 LAN IP 为 172.16.18.254
        sed -i 's/192.168.1.1/172.16.18.254/g' package/base-files/files/bin/config_generate
        
        # 修改默认时区为上海 (CST-8) 并添加 zonename
        sed -i "s/timezone='UTC'/timezone='CST-8'/g" package/base-files/files/bin/config_generate
        sed -i "/timezone='CST-8'/a \t\tset system.@system[-1].zonename='Asia/Shanghai'" package/base-files/files/bin/config_generate
        
        echo "✅ Default LAN IP changed to 172.16.18.254"
        echo "✅ Default Timezone changed to Asia/Shanghai (CST-8)"

    - name: Generate Base OpenWrt Configuration
      working-directory: ./openwrt
      run: |
        cat << 'EOF' > .config
        # ==========================================
        # 1. 硬件平台：Linksys WRT3200ACM
        # ==========================================
        CONFIG_TARGET_mvebu=y
        CONFIG_TARGET_mvebu_cortexa9=y
        CONFIG_TARGET_mvebu_cortexa9_DEVICE_linksys_wrt3200acm=y

        # ==========================================
        # 2. 开发者与 BPF 工具链 (编译 eBPF 必须)
        # ==========================================
        CONFIG_DEVEL=y
        CONFIG_BPF_TOOLCHAIN_HOST=y
        CONFIG_SDK_LLVM_BPF=y

        # ==========================================
        # 3. 补充 DAE/eBPF 所需的 OpenWrt 实体模块
        # ==========================================
        CONFIG_PACKAGE_kmod-sched-core=y
        CONFIG_PACKAGE_kmod-sched-bpf=y
        CONFIG_PACKAGE_kmod-sched-act=y
        CONFIG_PACKAGE_kmod-veth=y
        
        # ==========================================
        # 4. LuCI 管理界面与本地化
        # ==========================================
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-ssl=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y

        # ==========================================
        # 5. USB 与 Ext4 存储支持
        # ==========================================
        CONFIG_PACKAGE_kmod-usb-core=y
        CONFIG_PACKAGE_kmod-usb2=y
        CONFIG_PACKAGE_kmod-usb3=y
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_kmod-usb-storage-uas=y
        CONFIG_PACKAGE_kmod-scsi-core=y
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_block-mount=y
        CONFIG_PACKAGE_e2fsprogs=y
        EOF
        
        make defconfig
        echo "✅ Base .config generated and defconfig applied."

    - name: Inject Official DAE Kernel Configs natively
      working-directory: ./openwrt
      run: |
        echo "Injecting DAE + enhanced eBPF kernel configs..."
        for conf in target/linux/mvebu/config-*; do
          if [ -f "$conf" ]; then
            cat << 'EOF' >> "$conf"

        # --- DAE Official Kernel Requirements + Enhanced ---
        CONFIG_BPF=y
        CONFIG_BPF_SYSCALL=y
        CONFIG_BPF_JIT=y
        CONFIG_CGROUPS=y
        CONFIG_KPROBES=y
        CONFIG_NET_INGRESS=y
        CONFIG_NET_EGRESS=y
        CONFIG_NET_SCH_INGRESS=m
        CONFIG_NET_CLS_BPF=m
        CONFIG_NET_CLS_ACT=y
        CONFIG_NET_ACT_BPF=m
        CONFIG_BPF_STREAM_PARSER=y
        CONFIG_DEBUG_INFO=y
        # CONFIG_DEBUG_INFO_REDUCED is not set
        CONFIG_DEBUG_INFO_BTF=y
        CONFIG_DEBUG_INFO_BTF_MODULES=y
        CONFIG_KPROBE_EVENTS=y
        CONFIG_BPF_EVENTS=y
        CONFIG_BPF_LSM=y
        # ----------------------------------------
        EOF
            echo "✅ Successfully injected DAE params into $conf"
          fi
        done

    - name: Download Packages
      working-directory: ./openwrt
      run: make download -j8

    - name: Inject Official Vermagic (Fixed and robust method)
      working-directory: ./openwrt
      run: |
        echo "Fetching official manifest for WRT3200ACM v24.10.6..."
        OFFICIAL_MANIFEST="https://downloads.openwrt.org/releases/24.10.6/targets/mvebu/cortexa9/openwrt-24.10.6-mvebu-cortexa9.manifest"
        
        # 提取官方的 vermagic 变量
        VERMAGIC=$(curl -s $OFFICIAL_MANIFEST | grep "^kernel " | awk '{print $3}' | awk -F'-' '{print $NF}')
        echo "✅ Official Vermagic extracted: $VERMAGIC"
        
        # 直接替换 kernel-defaults.mk 里的生成命令，硬编码注入官方哈希值（这是最直接且不会被构建系统忽略的做法）
        sed -i "s/grep.*md5 > \$(LINUX_DIR)\/.vermagic/echo '$VERMAGIC' > \$(LINUX_DIR)\/.vermagic/g" include/kernel-defaults.mk

    - name: Compile Firmware
      working-directory: ./openwrt
      run: |
        echo "Starting compilation..."
        make -j$(nproc) V=s

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WRT3200ACM_DAE_Kernel_Images
        path: |
          openwrt/bin/targets/mvebu/cortexa9/*-factory.img
          openwrt/bin/targets/mvebu/cortexa9/*-sysupgrade.bin
          openwrt/bin/targets/mvebu/cortexa9/packages/
        retention-days: 30
