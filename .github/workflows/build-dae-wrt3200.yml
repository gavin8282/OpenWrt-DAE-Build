name: Build OpenWrt v24.10.6 DAE Kernel (WRT3200ACM)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Free Disk Space
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: false
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev \
        dwarves libelf-dev llvm

    - name: Clone Official OpenWrt v24.10.6
      run: |
        git clone -b v24.10.6 --single-branch https://git.openwrt.org/openwrt/openwrt.git openwrt

    - name: Update and Install Feeds
      working-directory: ./openwrt
      run: |
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Generate Strict Kernel Configuration
      working-directory: ./openwrt
      run: |
        cat << 'EOF' > .config
        # ==========================================
        # 1. 硬件平台：Linksys WRT3200ACM
        # ==========================================
        CONFIG_TARGET_mvebu=y
        CONFIG_TARGET_mvebu_cortexa9=y
        CONFIG_TARGET_mvebu_cortexa9_DEVICE_linksys_wrt3200acm=y

        # ==========================================
        # 2. 开发者与 BPF 工具链
        # ==========================================
        CONFIG_DEVEL=y
        CONFIG_BPF_TOOLCHAIN_HOST=y
        # CONFIG_BPF_TOOLCHAIN_NONE is not set

        # ==========================================
        # 3. eBPF 核心与系统调用 
        # ==========================================
        CONFIG_KERNEL_BPF=y
        CONFIG_KERNEL_BPF_SYSCALL=y
        CONFIG_KERNEL_BPF_JIT=y
        CONFIG_KERNEL_CGROUPS=y
        CONFIG_KERNEL_CGROUP_BPF=y
        
        # ==========================================
        # 4. 探针与事件
        # ==========================================
        CONFIG_KERNEL_KPROBES=y
        CONFIG_KERNEL_KPROBE_EVENTS=y
        CONFIG_KERNEL_BPF_EVENTS=y
        
        # ==========================================
        # 5. 调试信息与 BTF
        # ==========================================
        CONFIG_KERNEL_DEBUG_INFO=y
        CONFIG_KERNEL_DEBUG_INFO_BTF=y
        # CONFIG_KERNEL_DEBUG_INFO_REDUCED is not set
        
        # ==========================================
        # 6. XDP 与网络解析
        # ==========================================
        CONFIG_KERNEL_XDP_SOCKETS=y
        CONFIG_KERNEL_BPF_STREAM_PARSER=y

        # ==========================================
        # 7. 网络流量控制与调度
        # ==========================================
        CONFIG_KERNEL_NET_INGRESS=y
        CONFIG_KERNEL_NET_EGRESS=y
        CONFIG_KERNEL_NET_SCH_INGRESS=y
        CONFIG_KERNEL_NET_CLS_BPF=y
        CONFIG_KERNEL_NET_CLS_ACT=y

        # ==========================================
        # 8. LuCI 管理界面与本地化
        # ==========================================
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-ssl=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y

        # ==========================================
        # 9. USB 与 Ext4 存储支持
        # ==========================================
        CONFIG_PACKAGE_kmod-usb-core=y
        CONFIG_PACKAGE_kmod-usb2=y
        CONFIG_PACKAGE_kmod-usb3=y
        CONFIG_PACKAGE_kmod-usb-storage=y
        CONFIG_PACKAGE_kmod-usb-storage-uas=y
        CONFIG_PACKAGE_kmod-scsi-core=y
        CONFIG_PACKAGE_kmod-fs-ext4=y
        CONFIG_PACKAGE_block-mount=y
        CONFIG_PACKAGE_e2fsprogs=y
        EOF
        
        make defconfig

    - name: Download Packages
      working-directory: ./openwrt
      run: make download -j8

    - name: Inject Official Vermagic (Enable Official kmod Support)
      working-directory: ./openwrt
      run: |
        echo "Fetching official manifest for WRT3200ACM v24.10.6..."
        OFFICIAL_MANIFEST="https://downloads.openwrt.org/releases/24.10.6/targets/mvebu/cortexa9/openwrt-24.10.6-mvebu-cortexa9.manifest"
        
        # 提取官方的 vermagic
        curl -s $OFFICIAL_MANIFEST | grep "^kernel " | awk '{print $3}' | awk -F'-' '{print $NF}' > .vermagic
        echo "Official Vermagic extracted: $(cat .vermagic)"
        
        # 强行替换内核编译脚本中的 vermagic 生成逻辑，使用我们刚刚下载的官方哈希值
        sed -i 's/grep.*md5 > $(LINUX_DIR)\/.vermagic/cp $(TOPDIR)\/.vermagic $(LINUX_DIR)\/.vermagic/g' include/kernel-defaults.mk

    - name: Compile Firmware
      working-directory: ./openwrt
      run: make -j$(nproc) V=s

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: WRT3200ACM_DAE_Kernel_Images
        path: |
          openwrt/bin/targets/mvebu/cortexa9/*-factory.img
          openwrt/bin/targets/mvebu/cortexa9/*-sysupgrade.bin
