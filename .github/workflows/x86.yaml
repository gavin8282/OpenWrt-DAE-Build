name: x64 (Pure eBPF & BBR - High Performance)

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt 官方源码标签/分支'
        required: true
        default: 'v24.10.7'

jobs:
  build:
    name: Build Firmware and Packages
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    # 终极激进清理：干掉所有不需要的预装大件，腾出至少 30GB+ 的绝对干净空间
    - name: Free Disk Space (Ultimate)
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/share/swift
        sudo rm -rf /usr/local/share/powershell
        sudo rm -rf /usr/share/logstash
        sudo rm -rf /etc/mysql
        sudo rm -rf /etc/php
        sudo rm -rf /opt/hostedtoolcache
        sudo docker image prune --all --force
        sudo apt-get clean
        df -h

    # 安装全量编译依赖
    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gnutls-dev gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev \
          libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses-dev libpython3-dev \
          libreadline-dev libssl-dev libtool libyaml-dev libz-dev lld llvm lrzsz mkisofs msmtp nano \
          ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip python3-ply python3-docutils \
          python3-pyelftools qemu-utils re2c rsync scons squashfs-tools subversion swig texinfo uglifyjs \
          upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd npm
        
        # 重新全局安装 pnpm
        sudo npm install -g pnpm

    - name: Clone OpenWrt Source
      run: |
        git clone https://github.com/openwrt/openwrt.git -b ${{ github.event.inputs.openwrt_version }} openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Modify Default IP Address
      run: |
        cd openwrt
        sed -i 's/192.168.1.1/172.16.18.254/g' package/base-files/files/bin/config_generate

    - name: Configure Kernel & Packages
      run: |
        cd openwrt
        
        # Target System 修改为 x86_64 通用架构
        cat >> .config <<EOF
        CONFIG_TARGET_x86=y
        CONFIG_TARGET_x86_64=y
        CONFIG_TARGET_x86_64_DEVICE_generic=y
        EOF
        
        # 默认开启 TCP BBR 加速
        cat >> .config <<EOF
        CONFIG_KERNEL_TCP_CONG_BBR=y
        CONFIG_KERNEL_DEFAULT_TCP_CONG="bbr"
        EOF
        
        # 指定的内核 eBPF / BTF 支持清单
        cat >> .config <<EOF
        CONFIG_DEVEL=y
        CONFIG_BPF_TOOLCHAIN_HOST=y
        CONFIG_KERNEL_BPF=y
        CONFIG_KERNEL_BPF_SYSCALL=y
        CONFIG_KERNEL_BPF_JIT=y
        CONFIG_KERNEL_CGROUPS=y
        CONFIG_KERNEL_KPROBES=y
        CONFIG_KERNEL_NET_INGRESS=y
        CONFIG_KERNEL_NET_EGRESS=y
        CONFIG_PACKAGE_kmod-net-sch-ingress=m
        CONFIG_PACKAGE_kmod-net-cls-bpf=m
        CONFIG_KERNEL_NET_CLS_ACT=y
        CONFIG_KERNEL_BPF_STREAM_PARSER=y
        CONFIG_KERNEL_DEBUG_INFO=y
        CONFIG_KERNEL_DEBUG_INFO_REDUCED=n
        CONFIG_KERNEL_DEBUG_INFO_BTF=y
        CONFIG_KERNEL_KPROBE_EVENTS=y
        CONFIG_KERNEL_BPF_EVENTS=y
        EOF
        
        # eBPF 专项内存与系统优化支持
        cat >> .config <<EOF
        CONFIG_KERNEL_MEMCG=y
        CONFIG_KERNEL_MEMCG_SWAP=y
        CONFIG_KERNEL_TRANSPARENT_HUGEPAGE=y
        CONFIG_KERNEL_TRANSPARENT_HUGEPAGE_ALWAYS=y
        EOF
        
        # 高性能网络诊断、容器网络、高级流量调度包（全部直接内建编译 =y）
        cat >> .config <<EOF
        CONFIG_PACKAGE_kmod-xdp-sockets-diag=y
        CONFIG_PACKAGE_kmod-veth=y
        CONFIG_PACKAGE_kmod-sched-core=y
        CONFIG_PACKAGE_kmod-sched-bpf=y
        CONFIG_PACKAGE_kmod-sched=y
        CONFIG_PACKAGE_kmod-cls-bpf=y
        CONFIG_PACKAGE_kmod-nft-bridge=y
        CONFIG_PACKAGE_tc-full=y
        EOF
        
        # PVE 虚拟机专属优化组件 (Guest Agent & VirtIO 半虚拟化网卡)
        cat >> .config <<EOF
        CONFIG_PACKAGE_qemu-ga=y
        CONFIG_PACKAGE_kmod-virtio=y
        CONFIG_PACKAGE_kmod-virtio-net=y
        CONFIG_PACKAGE_kmod-virtio-balloon=y
        CONFIG_PACKAGE_kmod-acpi-button=y
        EOF
        
        # 多核 CPU 中断平衡工具
        cat >> .config <<EOF
        CONFIG_PACKAGE_irqbalance=y
        EOF
        
        # 禁用非必要的物理网卡驱动及固件
        cat >> .config <<EOF
        CONFIG_FIRMWARE_INCLUDE_ALL=n
        EOF
        
        # LuCI 基础组件及中文语言包
        cat >> .config <<EOF
        CONFIG_PACKAGE_luci=y
        CONFIG_PACKAGE_luci-base=y
        CONFIG_PACKAGE_luci-compat=y
        CONFIG_LUCI_LANG_zh_Hans=y
        CONFIG_PACKAGE_luci-i18n-base-zh-cn=y
        EOF
        
        make defconfig

    - name: Download Packages
      run: |
        cd openwrt
        make download -j8 || make download -j1 V=s

    - name: Compile Firmware
      run: |
        cd openwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OpenWrt-x64-PVE-Pure-eBPF
        path: |
          openwrt/bin/targets/x86/64/*-generic-squashfs-combined*.img.gz
        retention-days: 7
